<!DOCTYPE html>
<html>
<head>
<title>Hacker Login Animation</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial,sans-serif;
}

/* Neon Background */
.bg{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(to bottom,
rgba(0,255,0,.05),
rgba(0,0,0,1));
}

/* Boy */
.boy{
position:absolute;
bottom:80px;
left:-120px;
font-size:80px;
animation:walk 5s linear forwards;
}

/* Walk Animation */
@keyframes walk{
0%{
left:-120px;
}
100%{
left:40%;
}
}

/* Title */
.title{
position:absolute;
top:50px;
color:#00ff00;
font-size:35px;
text-shadow:0 0 15px #00ff00;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.5;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="title">
HACKER LOGIN SYSTEM
</div>

<div class="boy">
🚶‍♂️
</div>
<div class="bg"></div>

<div class="title">HACKER LOGIN SYSTEM</div>

<div class="boy" id="boy">
🚶‍♂️<span id="bag">🎒</span>
</div>

<!-- LOGIN FORM -->
<div class="login" id="loginBox">

<h2>ACCESS LOGIN</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>LOGIN</button>

</div>
</body>
</html>
